# Create the environment:
# mamba env create -f environment.yml
# or if you really want to use conda
# conda env create -f environment.yml

name: aqua-diagnostics
channels:
  - conda-forge
  - nodefaults
# please note that some of these dependencies are made explicit on purpose, but are not directly required by conda/mamba
dependencies:
  # binaries
  - python>=3.11,<3.15
  - cdo>=2.5.0,<2.6.1 #for smmregrid compatibility
  - eccodes>=2.41.0,<=2.47.0
  - cartopy>=0.24.1,<=0.25.0
  - cartopy_offlinedata # this is needed for MN5 HPC
  - netcdf4<=1.7.4
  - hdf5<=2.10.0
  - h5py>=3.12.1,<=3.16.0
  # python
  - astropy-healpix<=1.1.3
  - boto3<=1.42.63
  - cfgrib<=0.9.15.1
  - dask<=2026.1.2
  - fastparquet<=2025.12.0
  - filelock<=3.25.0
  - gcsfs<=2026.2.0
  - icechunk<=2.0.5
  - intake>=2.0.9,<=2.0.9
  - intake-xarray<=2.0.0
  - jinja2<=3.1.6
  - kerchunk<=0.2.9
  - matplotlib<=3.10.8
  - metpy<=1.7.1
  - numpy<=2.4.1
  - pandas>=3.0.0,<=3.0.3
  - pypdf<=6.7.5
  - pyyaml<=6.0.3
  - regionmask<=0.13.0
  - ruamel.yaml<=0.19.1
  - scipy<=1.17.0
  - seaborn<=0.13.2
  - smmregrid==0.1.6
  - typeguard<=4.5.1
  - xarray>=2025.12.0,<=2026.7.0
  - zarr>=3.0,<=3.2.1
  # extra required by diagnostics
  - tempest-extremes<=2.3.1 # for TCs
  - xesmf<=0.9.2 # for ECmean
  - ecmean<=0.2.0
  # various
  - pip
  # legacy frontier diagnostics
  - pip:
    - -e ./frontier-diagnostics/tropical_cyclones/ # pip install -e of tropical cyclones
    - -e ./frontier-diagnostics/tropical_rainfall/ # pip install -e of tropical_rainfall
    # pip install -e of AQUA itself
    - -e .[all]
