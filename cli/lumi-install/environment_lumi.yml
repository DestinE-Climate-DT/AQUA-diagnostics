# Create the environment:
# mamba env create -f environment.yml
# or if you really want to use conda
# conda env create -f environment.yml

name: aqua-diagnostics
channels:
  - conda-forge
  - nodefaults
# please note that some of these dependencies are made explicit on purpose, but are not directly required by conda/mamba
dependencies:
  # binaries
  - python>=3.10,<3.15
  - cdo>=2.5.0,<2.6.1 #for smmregrid compatibility
  - eccodes>=2.41.0,<=2.48.0
  - cartopy>=0.24.1,<=0.25.0
  - cartopy_offlinedata # this is needed for MN5 HPC
  - h5py>=3.12.1,<=3.16.0
  - hdf5<=2.10.0
  - netcdf4<=1.7.4
  # extra diagnostics
  - tempest-extremes<=2.3.1 # for TCs
  - xesmf<=0.9.2 # for ECmean
  - ecmean<=0.2.0
  # various
  - pip
